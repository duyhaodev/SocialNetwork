server:
  port: 8888

spring:
  main:
    web-application-type: reactive

  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8080
          predicates:
            - Path=/identity/**
        - id: profile-service
          uri: http://localhost:8081
          predicates:
            - Path=/profile/users/**
        - id: notification-service
          uri: http://localhost:8082
          predicates:
            - Path=/notification/**
        - id: chat-service
          uri: http://localhost:8083
          predicates:
            - Path=/chat/**
        - id: follow-service
          uri: http://localhost:8084
          predicates:
            - Path=/follow/**

management:
  endpoints:
    web:
      exposure:
        include: "*"