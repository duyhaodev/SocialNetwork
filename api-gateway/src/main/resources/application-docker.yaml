spring:
  codec:
    max-in-memory-size: 20MB

  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://identity-service:8080
          predicates:
            - Path=/identity/**
        - id: profile-service
          uri: http://profile-service:8081
          predicates:
            - Path=/profile/**
        - id: notification-service
          uri: http://notification-service:8082
          predicates:
            - Path=/notification/**
        - id: chat-service
          uri: http://chat-service:8083
          predicates:
            - Path=/chat/**
        - id: interaction-service
          uri: http://interaction-service:8087
          predicates:
            - Path=/interaction/**
        - id: search-service
          uri: http://search-service:8090
          predicates:
            - Path=/search/**
        - id: post-service
          uri: http://post-service:8085
          predicates:
            - Path=/post/posts/**,/post/feed/**
        - id: follow-service
          uri: http://follow-service:8084
          predicates:
            - Path=/follow/**
        - id: media-service
          uri: http://media-service:8086
          predicates:
            - Path=/media/**
        - id: realtime-service
          uri: http://realtime-service:8088
          predicates:
            - Path=/realtime/**
        - id: ai-service
          uri: http://ai-service:8092
          predicates:
            - Path=/ai/**
        - id: story-service
          uri: http://story-service:8091
          predicates:
            - Path=/story/**

app:
  identity:
    url: http://identity-service:8080/identity
