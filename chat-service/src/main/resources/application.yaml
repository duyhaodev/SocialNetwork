server:
  port: 8083
  servlet:
    context-path: /chat

spring:
  application:
    name: chat-service
  data:
    mongodb:
      uri: mongodb://root:root@localhost:27017/chat-service?authSource=admin

app:
  service:
    profile: http://localhost:8081/profile
    media: http://localhost:8086

rt-service:
  redis:
    channel: realtime-topic