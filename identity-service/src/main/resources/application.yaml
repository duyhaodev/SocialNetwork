server:
  port: 8080
  servlet:
    context-path: /identity

spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/identity_service"
    username: root
    password: 123456
    driverClassName: "com.mysql.jdbc.Driver"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    host: "smtp.gmail.com"
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 86400 # in second
  refreshable-duration: 1296000 # in second (15 days)

app:
  service:
    profile: http://localhost:8081/profile

realtime:
  redis:
    channel: realtime-topic
